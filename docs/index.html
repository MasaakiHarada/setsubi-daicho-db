<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>設備台帳管理システム（デモ）</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Noto Sans CJK JP", Arial, sans-serif;
    margin: 0; background: #FFFFFF; color: #222;
  }
  /* ---------- login screen ---------- */
  #login-screen {
    height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .login-box {
    width: 340px; border: 1px solid #E4E6EA; border-radius: 10px; padding: 28px;
  }
  .login-box h1 { font-size: 17px; color: #1E2761; margin: 0 0 4px; }
  .login-box p.sub { font-size: 12.5px; color: #666; margin: 0 0 20px; }
  .login-box label { display: block; font-size: 12px; color: #666; margin: 12px 0 4px; }
  .login-box input {
    width: 100%; padding: 8px 10px; font-size: 13px; border: 1px solid #D5D8DD; border-radius: 6px;
  }
  .login-tabs { display: flex; gap: 6px; margin-bottom: 6px; }
  .login-tabs button {
    flex: 1; padding: 6px 0; border: 1px solid #D5D8DD; background: #FAFAFB; border-radius: 6px;
    font-size: 12.5px; cursor: pointer; color: #555;
  }
  .login-tabs button.active { background: #1E2761; color: #fff; border-color: #1E2761; }
  .login-box .btn { width: 100%; margin-top: 18px; }
  #login-msg { min-height: 18px; font-size: 12px; margin-top: 10px; }
  #login-msg.err { color: #B85042; }
  #login-msg.ok { color: #1E7A3D; }

  /* ---------- app shell ---------- */
  #app-screen { display: none; height: 100vh; overflow: hidden; flex-direction: column; }
  #topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; border-bottom: 1px solid #E4E6EA; flex-shrink: 0;
  }
  #topbar .title { font-size: 14px; font-weight: 600; color: #1E2761; }
  #topbar .user { font-size: 12.5px; color: #666; display: flex; align-items: center; gap: 10px; }
  #body-wrap { flex: 1; display: flex; overflow: hidden; }
  #sidebar {
    width: 190px; flex-shrink: 0; background: #F7F8FA; border-right: 1px solid #E4E6EA;
    padding: 12px 0; overflow-y: auto;
  }
  #sidebar .grp-label { font-size: 11px; color: #888; padding: 10px 14px 4px; text-transform: uppercase; letter-spacing: .03em; }
  .tab-btn {
    display: block; width: 100%; text-align: left; padding: 8px 14px; border: none; background: none;
    font-size: 13px; color: #333; cursor: pointer; border-left: 3px solid transparent;
  }
  .tab-btn:hover { background: #EEF0F3; }
  .tab-btn.active { background: #E8ECF5; border-left-color: #1E2761; color: #1E2761; font-weight: 600; }
  #main { flex: 1; overflow-y: auto; padding: 24px 32px; }
  h1.page-title { font-size: 18px; margin: 0 0 2px; color: #1E2761; }
  .desc { font-size: 12.5px; color: #666; margin: 0 0 18px; }
  .card { border: 1px solid #E4E6EA; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
  .card h2 { font-size: 13px; margin: 0 0 12px; color: #333; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; align-items: end; }
  .field label { display: block; font-size: 11px; color: #666; margin-bottom: 3px; }
  .field input, .field select {
    width: 100%; padding: 6px 8px; font-size: 13px; border: 1px solid #D5D8DD; border-radius: 5px; background: #fff;
  }
  .btn {
    padding: 7px 14px; font-size: 13px; border-radius: 6px; border: none; cursor: pointer; background: #1E2761; color: #fff;
  }
  .btn:hover { background: #2c3a8a; }
  .btn.danger { background: #B85042; padding: 4px 10px; font-size: 12px; }
  .btn.danger:hover { background: #d0604f; }
  .btn.ghost { background: none; border: 1px solid #D5D8DD; color: #444; }
  .btn.small { padding: 4px 10px; font-size: 12px; }
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
  }
  .modal-box {
    background: #fff; border-radius: 10px; padding: 22px; width: 420px; max-width: 90vw;
    max-height: 85vh; overflow-y: auto;
  }
  .modal-box h2 { font-size: 15px; margin: 0 0 4px; color: #1E2761; }
  table.data { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.data th, table.data td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #EEE; white-space: nowrap; }
  table.data th { color: #666; font-weight: 600; background: #FAFAFB; position: sticky; top: 0; }
  table.data tbody tr:hover { background: #FAFBFC; }
  .badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; }
  .badge.now { background: #E4F3EA; color: #1E7A3D; }
  .msg { font-size: 12.5px; padding: 8px 10px; border-radius: 6px; margin-bottom: 12px; }
  .msg.err { background: #FBEDE9; color: #B85042; }
  .msg.ok { background: #E4F3EA; color: #1E7A3D; }
  .table-scroll { max-height: 320px; overflow: auto; border: 1px solid #EEE; border-radius: 6px; }
  .empty { color: #999; font-size: 12.5px; padding: 10px 0; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

  /* ---------- 台帳確認画面 ---------- */
  .ledger-layout { display: flex; gap: 16px; align-items: flex-start; }
  .ledger-sidebar { width: 270px; flex-shrink: 0; padding: 14px; }
  .ledger-sidebar h2 { font-size: 13px; margin: 0 0 10px; color: #333; }
  .ledger-filters { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #EEE; }
  .ledger-filters .field { margin: 0; }
  .ledger-count { font-size: 11px; color: #999; margin: 0 0 8px; }
  .ledger-eq-list { display: flex; flex-direction: column; gap: 4px; max-height: 60vh; overflow-y: auto; }
  .ledger-eq-item {
    display: block; width: 100%; text-align: left; border: 1px solid #E4E6EA; border-left: 3px solid var(--sc-color, #C7CAD1);
    background: #fff; border-radius: 7px; padding: 8px 10px; cursor: pointer; transition: background .12s, box-shadow .12s;
  }
  .ledger-eq-item:hover { background: #FAFBFC; box-shadow: 0 1px 4px rgba(30,39,97,0.08); }
  .ledger-eq-item.active { background: #E8ECF5; border-left-color: #1E2761; box-shadow: none; }
  .ledger-eq-item .eq-name { font-size: 13px; font-weight: 600; color: #222; }
  .ledger-eq-item.active .eq-name { color: #1E2761; }
  .ledger-eq-item .eq-meta { font-size: 11px; color: #888; margin-top: 2px; }
  .sc-chip { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 600; margin-right: 5px; color: #fff; vertical-align: 1px; }

  .ledger-detail-head {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
    border-bottom: 1px solid #EEE; padding-bottom: 10px; margin-bottom: 14px;
  }
  .ledger-detail-head .eq-title { font-size: 16px; font-weight: 700; color: #1E2761; }
  .ledger-detail-head .eq-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .tag { display: inline-flex; align-items: center; font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #F0F1F5; color: #555; }

  .ledger-tree { font-size: 13px; }
  .tree-node { position: relative; padding: 7px 0 2px 0; }
  .tree-node.depth0 { font-weight: 600; margin-top: 6px; }
  .tree-node .node-icon { display: inline-block; width: 8px; height: 8px; margin-right: 7px; border-radius: 2px; background: #1E2761; vertical-align: 1px; }
  .tree-node.depth-n .node-icon { width: 6px; height: 6px; border-radius: 50%; background: #B7BCC8; }

  .ind-card {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 7px; background: #FAFAFB; border: 1px solid transparent; cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .ind-card:hover { background: #F1F3F8; }
  .ind-card.active { background: #E8ECF5; border-color: #C6CCEA; }
  .ind-card .ind-name { font-weight: 600; font-size: 13px; color: #222; }
  .ind-card .ind-sub { font-size: 11.5px; color: #777; margin-top: 1px; }
  .ind-card .go { font-size: 11px; color: #1E2761; flex-shrink: 0; }

  .attr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px,1fr)); gap: 8px; margin-bottom: 14px; }
  .attr-chip { background: #FAFAFB; border: 1px solid #EEE; border-radius: 6px; padding: 6px 10px; }
  .attr-chip .k { display: block; font-size: 10.5px; color: #888; margin-bottom: 2px; }
  .attr-chip .v { font-size: 13px; color: #222; }

  .timeline { position: relative; margin-left: 4px; padding-left: 16px; border-left: 2px solid #EDEEF2; }
  .timeline-item { position: relative; padding-bottom: 12px; font-size: 12.5px; }
  .timeline-item:last-child { padding-bottom: 0; }
  .timeline-item::before {
    content: ''; position: absolute; left: -21px; top: 3px; width: 8px; height: 8px; border-radius: 50%;
    background: #C7CAD1; border: 2px solid #fff;
  }
  .timeline-item.current::before { background: #1E7A3D; }
  .timeline-item .period { font-weight: 600; color: #333; }
  .timeline-item .place { color: #777; margin-left: 4px; }

  .skeleton-line { height: 34px; border-radius: 6px; margin-bottom: 6px; background: linear-gradient(90deg,#F1F2F5 25%,#E7E9EE 37%,#F1F2F5 63%); background-size: 400% 100%; animation: shimmer 1.3s infinite; }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }

  @media (max-width: 860px) {
    .ledger-layout { flex-direction: column; }
    .ledger-sidebar { width: 100%; }
    .ledger-eq-list { max-height: 260px; }
  }

  /* ---------- 設備交換履歴画面 ---------- */
  .exchange-initial {
    border: 1px dashed #D5D8DD; border-radius: 8px; padding: 9px 12px; margin-bottom: 8px; background: #FAFAFB;
  }
  .exchange-initial .lbl { font-size: 10px; color: #999; }
  .exchange-initial .nm { font-weight: 600; font-size: 13px; color: #222; margin-top: 2px; }
  .exchange-initial .meta { font-size: 11px; color: #777; margin-top: 2px; }
  .exchange-card {
    border: 1px solid #E4E6EA; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
  }
  .exchange-date { font-size: 11px; color: #888; margin-bottom: 8px; }
  .exchange-row { display: flex; align-items: center; gap: 10px; }
  .exchange-box { flex: 1; min-width: 0; padding: 8px 10px; border-radius: 6px; background: #FAFAFB; }
  .exchange-box.old { opacity: .7; }
  .exchange-box.new { background: #E8ECF5; }
  .exchange-box .lbl { font-size: 10px; color: #999; margin-bottom: 2px; }
  .exchange-box .nm { font-weight: 600; font-size: 13px; color: #222; }
  .exchange-box .meta { font-size: 11px; color: #777; margin-top: 2px; }
  .exchange-arrow { flex-shrink: 0; color: #1E2761; font-size: 16px; font-weight: 700; }
  .exchange-note { font-size: 11.5px; color: #666; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #EEE; }
  .go { font-size: 11px; color: #1E2761; margin-top: 4px; }
  .exchange-box.new[data-individual-id], .exchange-initial[data-individual-id] {
    cursor: pointer; transition: box-shadow .12s, outline-color .12s;
  }
  .exchange-box.new[data-individual-id]:hover, .exchange-initial[data-individual-id]:hover { box-shadow: 0 1px 4px rgba(30,39,97,0.12); }
  .exchange-box.new.selected, .exchange-initial.selected { outline: 2px solid #1E2761; outline-offset: 1px; }
  .action-row { margin-bottom: 12px; }

  /* ---------- 個体交換登録モーダル ---------- */
  .toggle-group { display: flex; gap: 6px; margin-bottom: 14px; }
  .toggle-btn {
    flex: 1; padding: 7px 0; border: 1px solid #D5D8DD; background: #FAFAFB; border-radius: 6px;
    font-size: 12.5px; cursor: pointer; color: #555;
  }
  .toggle-btn.active { background: #1E2761; color: #fff; border-color: #1E2761; }
</style>
</head>
<body>

<!-- ============ ログイン画面 ============ -->
<div id="login-screen">
  <div class="login-box">
    <h1>設備台帳管理システム（デモ）</h1>
    <p class="sub">Supabaseアカウントでログインしてください</p>
    <div class="login-tabs">
      <button id="tab-login" class="active">ログイン</button>
      <button id="tab-signup">新規登録</button>
    </div>
    <label>メールアドレス</label>
    <input type="email" id="login-email" autocomplete="username">
    <label>パスワード</label>
    <input type="password" id="login-password" autocomplete="current-password">
    <button class="btn" id="login-submit">ログイン</button>
    <div id="login-msg"></div>
  </div>
</div>

<!-- ============ アプリ本体 ============ -->
<div id="app-screen">
  <div id="topbar">
    <div class="title">設備台帳管理システム（デモ）</div>
    <div class="user"><span id="user-email"></span><button class="btn ghost" id="logout-btn">ログアウト</button></div>
  </div>
  <div id="body-wrap">
    <nav id="sidebar"></nav>
    <main id="main"></main>
  </div>
</div>

<script>
// ================= Supabase接続設定 =================
const SUPABASE_URL = 'https://nbahkykcxlulzkafrmkf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iYWhreWtjeGx1bHprYWZybWtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MDIzNTIsImV4cCI6MjA5OTQ3ODM1Mn0.ehFxmUVOLzY8t1JkqqMbk1aF6Wr3IrM0Gke0xzZaFC4';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ================= テーブル定義（アーティファクト版と同じ構成） =================
const TABLES = [
  {
    key: 'locations', label: '場所', group: '設備系マスタメンテナンス',
    desc: '駅・機器室・キロ程・支持物などの場所マスタ',
    labelCol: 'location_name', orderCol: 'id',
    fields: [
      { col: 'location_type_kbn', label: '場所種別区分', kind: 'select', options: [[1,'駅'],[2,'機器室'],[3,'キロ程'],[4,'支持物']], required: true },
      { col: 'location_name', label: '場所名称', kind: 'text', required: true },
      { col: 'parent_location_id', label: '親場所', kind: 'fk', refTable: 'locations', required: false },
      { col: 'kilo_post', label: 'キロ程値', kind: 'numeric', required: false },
      { col: 'display_order', label: '表示順', kind: 'int', required: false },
    ],
  },
  {
    key: 'equipment_types', label: '設備種別', group: '設備系マスタメンテナンス',
    desc: '設備の"クラス"を定義するマスタ（転てつ機、踏切など）',
    labelCol: 'equipment_type_name', orderCol: 'id',
    fields: [
      { col: 'equipment_type_name', label: '設備種別名称', kind: 'text', required: true },
      { col: 'system_category_kbn', label: '系統区分', kind: 'select', options: [[1,'施設'],[2,'保線'],[3,'機械'],[4,'電力'],[5,'信通']], required: true },
      { col: 'equipment_form_kbn', label: '設備形態区分', kind: 'select', options: [[1,'箱もの'],[2,'線もの']], required: true },
    ],
  },
  {
    key: 'equipment_type_components', label: '構成要素', group: '設備系マスタメンテナンス',
    desc: '設備種別を構成する主装置・付属部品（階層構造・自己参照）',
    labelCol: 'component_name', orderCol: 'id',
    fields: [
      { col: 'equipment_type_id', label: '設備種別', kind: 'fk', refTable: 'equipment_types', required: true },
      { col: 'parent_component_id', label: '親構成要素（付属部品の場合）', kind: 'fk', refTable: 'equipment_type_components', required: false },
      { col: 'component_name', label: '構成要素名称', kind: 'text', required: true },
      { col: 'display_order', label: '表示順', kind: 'int', required: false },
    ],
  },
  {
    key: 'equipments', label: '設備', group: '設備系マスタメンテナンス',
    desc: '設備種別×場所の組み合わせで決まるインスタンス',
    labelCol: 'equipment_name', orderCol: 'id',
    fields: [
      { col: 'equipment_name', label: '設備名称', kind: 'text', required: true },
      { col: 'equipment_type_id', label: '設備種別', kind: 'fk', refTable: 'equipment_types', required: true },
      { col: 'location_id_from', label: '場所(自)', kind: 'fk', refTable: 'locations', required: true },
      { col: 'location_id_to', label: '場所(至・線ものの場合)', kind: 'fk', refTable: 'locations', required: false },
      { col: 'install_date', label: '取付日', kind: 'date', required: false },
      { col: 'note', label: '備考', kind: 'text', required: false },
    ],
  },
  {
    key: 'product_categories', label: '製品種別', group: '製品系マスタメンテナンス',
    desc: '個体の属性スキーマを決めるための製品分類（リレー、遮断機本体等）',
    labelCol: 'product_category_name', orderCol: 'id',
    fields: [
      { col: 'product_category_name', label: '製品種別名称', kind: 'text', required: true },
    ],
  },
  {
    key: 'attribute_definitions', label: '属性定義', group: '製品系マスタメンテナンス',
    desc: '製品種別ごとに管理項目（属性）を定義するマスタ',
    labelCol: 'attribute_name', orderCol: 'id',
    fields: [
      { col: 'product_category_id', label: '製品種別', kind: 'fk', refTable: 'product_categories', required: true },
      { col: 'attribute_name', label: '属性名称', kind: 'text', required: true },
      { col: 'data_type_kbn', label: 'データ型区分', kind: 'select', options: [[1,'数値'],[2,'文字'],[3,'日付'],[4,'真偽']], required: true },
      { col: 'unit', label: '単位', kind: 'text', required: false },
      { col: 'display_order', label: '表示順', kind: 'int', required: false },
    ],
  },
  {
    key: 'individuals', label: '個体', group: '製品系マスタメンテナンス',
    desc: '主装置・付属部品として現地に設置される物理製品（メーカー・型式・製造番号）',
    labelCol: 'individual_name', orderCol: 'id',
    fields: [
      { col: 'individual_name', label: '個体名称', kind: 'text', required: true },
      { col: 'product_category_id', label: '製品種別', kind: 'fk', refTable: 'product_categories', required: true, editable: true },
      { col: 'maker_name', label: 'メーカー名', kind: 'text', required: false },
      { col: 'model_number', label: '型式', kind: 'text', required: false },
      { col: 'serial_number', label: '製造番号', kind: 'text', required: false },
      { col: 'manufactured_month', label: '製造年月', kind: 'date', required: false },
      { col: 'note', label: '備考', kind: 'text', required: false },
    ],
  },
  {
    key: 'individual_attribute_values', label: '個体属性値', group: '製品系マスタメンテナンス',
    desc: '個体ごとに可変な管理項目の値（EAV方式）',
    labelCol: null, orderCol: 'individual_id',
    compositeKey: ['individual_id', 'attribute_definition_id'],
    fields: [
      { col: 'individual_id', label: '個体', kind: 'fk', refTable: 'individuals', required: true },
      { col: 'attribute_definition_id', label: '属性定義', kind: 'fk', refTable: 'attribute_definitions', required: true },
      { col: 'attribute_value', label: '属性値', kind: 'text', required: false },
    ],
  },
  {
    key: 'individual_installation_histories', label: '個体設置履歴', group: '製品系マスタメンテナンス',
    desc: '個体がどの設備・構成要素スロットにいつ設置されていたかの履歴（要件④）',
    labelCol: null, orderCol: 'id',
    fields: [
      { col: 'individual_id', label: '個体', kind: 'fk', refTable: 'individuals', required: true },
      { col: 'equipment_id', label: '設備', kind: 'fk', refTable: 'equipments', required: true },
      { col: 'component_id', label: '構成要素', kind: 'fk', refTable: 'equipment_type_components', required: true },
      { col: 'installed_date', label: '設置日', kind: 'date', required: true },
      { col: 'removed_date', label: '撤去日（空欄=現在設置中）', kind: 'date', required: false },
      { col: 'note', label: '備考', kind: 'text', required: false },
    ],
  },
];
const TABLE_MAP = Object.fromEntries(TABLES.map(t => [t.key, t]));

// ================= 台帳確認画面（テーブルをまたいだ表示） =================
const SPECIAL_VIEWS = [
  { key: 'ledger_view', label: '台帳確認', group: '業務メニュー' },
  { key: 'product_view', label: '製品確認', group: '業務メニュー' },
  { key: 'equipment_type_view', label: '設備種別確認', group: '業務メニュー' },
];
const SYSTEM_CATEGORY_LABELS = { 1: '施設', 2: '保線', 3: '機械', 4: '電力', 5: '信通' };
const SYSTEM_CATEGORY_COLORS = { 1: '#3E7CB1', 2: '#4C9F70', 3: '#B98A3B', 4: '#B85042', 5: '#6E5AA6' };

function escapeHtml(s) {
  return String(s === null || s === undefined ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ================= ログイン画面のロジック =================
let signupMode = false;
document.getElementById('tab-login').onclick = () => setMode(false);
document.getElementById('tab-signup').onclick = () => setMode(true);
function setMode(isSignup) {
  signupMode = isSignup;
  document.getElementById('tab-login').classList.toggle('active', !isSignup);
  document.getElementById('tab-signup').classList.toggle('active', isSignup);
  document.getElementById('login-submit').textContent = isSignup ? '新規登録' : 'ログイン';
  document.getElementById('login-msg').textContent = '';
}
document.getElementById('login-submit').onclick = async () => {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const msg = document.getElementById('login-msg');
  msg.className = ''; msg.textContent = '';
  if (!email || !password) {
    msg.className = 'err'; msg.textContent = 'メールアドレスとパスワードを入力してください';
    return;
  }
  try {
    if (signupMode) {
      const { error } = await sb.auth.signUp({ email, password });
      if (error) throw error;
      msg.className = 'ok'; msg.textContent = '登録しました。確認メールの設定によっては、そのままログインできます。';
    } else {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
    }
  } catch (e) {
    msg.className = 'err'; msg.textContent = e.message || String(e);
  }
};
document.getElementById('logout-btn').onclick = () => sb.auth.signOut();

sb.auth.onAuthStateChange((event, session) => {
  if (session) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    document.getElementById('user-email').textContent = session.user.email;
    renderSidebar();
    renderMain();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }
});

  searchText: '',

  components: [],
  histories: [],

};

  individuals: [],
  attributeDefs: [],

};

async function loadFkOptions(refTable) {
  const t = TABLE_MAP[refTable];
  const cols = t.labelCol ? `id, ${t.labelCol}` : 'id';
  const { data, error } = await sb.from(refTable).select(cols).order('id');
  if (error) throw error;
  const rows = (data || []).map(r => ({ id: r.id, lbl: t.labelCol ? r[t.labelCol] : ('#' + r.id) }));
  fkCache[refTable] = rows;
  return rows;
}

function renderSidebar() {
  const groups = {};
  [...SPECIAL_VIEWS, ...TABLES].forEach(t => { (groups[t.group] = groups[t.group] || []).push(t); });
  const nav = document.getElementById('sidebar');
  nav.innerHTML = '';
  Object.entries(groups).forEach(([g, tabs]) => {
    const label = document.createElement('div');
    label.className = 'grp-label';
    label.textContent = g;
    nav.appendChild(label);
    tabs.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (t.key === activeKey ? ' active' : '');
      btn.textContent = t.label;
      btn.onclick = () => { activeKey = t.key; renderSidebar(); renderMain(); };
      nav.appendChild(btn);
    });
  });
}

async function renderMain() {
  if (activeKey === 'ledger_view') { await renderLedgerView(); return; }
  if (activeKey === 'product_view') { await renderProductView(); return; }
  if (activeKey === 'equipment_type_view') { await renderEquipmentTypeView(); return; }
  const t = TABLE_MAP[activeKey];
  const main = document.getElementById('main');
  main.innerHTML = `
    <h1 class="page-title">${t.label}</h1>
    <p class="desc">${t.desc}</p>
    <div id="msgbox"></div>
    <div class="card">
      <h2>新規登録</h2>
      <div class="form-grid" id="form-fields"></div>
      <div style="margin-top:12px;"><button class="btn" id="add-btn">追加</button></div>
    </div>
    <div class="card">
      <div class="toolbar">
        <h2 style="margin:0;">登録済みデータ</h2>
        <button class="btn ghost" id="refresh-btn">再読込</button>
      </div>
      <div class="table-scroll"><div id="data-table">読み込み中...</div></div>
    </div>
  `;
  document.getElementById('refresh-btn').onclick = () => renderMain();

  const fieldsWrap = document.getElementById('form-fields');
  fieldsWrap.innerHTML = '';
  for (const f of t.fields) {
    const div = document.createElement('div');
    div.className = 'field';
    const lab = document.createElement('label');
    lab.textContent = f.label + (f.required ? ' *' : '');
    div.appendChild(lab);
    let input;
    if (f.kind === 'select') {
      input = document.createElement('select');
      input.innerHTML = '<option value="">-- 選択 --</option>' + f.options.map(([v, l]) => `<option value="${v}">${l}</option>`).join('');
    } else if (f.kind === 'fk') {
      input = document.createElement('select');
      let opts = [];
      try { opts = await loadFkOptions(f.refTable); } catch (e) { console.error(e); }
      input.innerHTML = '<option value="">-- 選択 --</option>' + opts.map(r => `<option value="${r.id}">#${r.id} ${escapeHtml(r.lbl)}</option>`).join('');
    } else if (f.kind === 'date') {
      input = document.createElement('input'); input.type = 'date';
    } else if (f.kind === 'int' || f.kind === 'numeric') {
      input = document.createElement('input'); input.type = 'number';
    } else {
      input = document.createElement('input'); input.type = 'text';
    }
    input.id = 'f_' + f.col;
    div.appendChild(input);
    fieldsWrap.appendChild(div);
  }
  document.getElementById('add-btn').onclick = () => onAdd(t);

  await loadDataTable(t);
}

function showMsg(text, isErr) {
  const box = document.getElementById('msgbox');
  box.innerHTML = `<div class="msg ${isErr ? 'err' : 'ok'}">${escapeHtml(text)}</div>`;
  if (!isErr) setTimeout(() => { box.innerHTML = ''; }, 4000);
}

function castVal(v, kind) {
  if (v === '' || v === null || v === undefined) return null;
  if (kind === 'int' || kind === 'fk' || kind === 'select') return parseInt(v, 10);
  if (kind === 'numeric') return parseFloat(v);
  return v;
}

async function onAdd(t) {
  const payload = {};
  for (const f of t.fields) {
    const el = document.getElementById('f_' + f.col);
    const v = el.value;
    if (f.required && !v) {
      showMsg(`「${f.label}」は必須です`, true);
      return;
    }
    payload[f.col] = castVal(v, f.kind);
  }
  const { error } = await sb.from(t.key).insert(payload);
  if (error) {
    showMsg('登録に失敗しました: ' + error.message, true);
  } else {
    showMsg('登録しました');
    renderMain();
  }
}

async function onDelete(t, row) {
  if (!confirm('この行を削除しますか？')) return;
  let q = sb.from(t.key).delete();
  if (t.compositeKey) {
    t.compositeKey.forEach(c => { q = q.eq(c, row[c]); });
  } else {
    q = q.eq('id', row.id);
  }
  const { error } = await q;
  if (error) {
    showMsg('削除に失敗しました（他のデータから参照されている可能性があります）: ' + error.message, true);
  } else {
    showMsg('削除しました');
    renderMain();
  }
}

async function loadDataTable(t) {
  const box = document.getElementById('data-table');
  const { data: rows, error } = await sb.from(t.key).select('*').order(t.orderCol, { ascending: false }).limit(200);
  if (error) {
    box.innerHTML = `<div class="msg err">読み込みエラー: ${escapeHtml(error.message)}</div>`;
    return;
  }
  if (!rows || !rows.length) {
    box.innerHTML = '<div class="empty">データがありません</div>';
    return;
  }

  // 外部キー列は、idだけでなく参照先の名称も併せて表示する
  const fkFields = t.fields.filter(f => f.kind === 'fk');
  const fkLabelMaps = {};
  if (fkFields.length) {
    await Promise.all(fkFields.map(async f => {
      try {
        const opts = await loadFkOptions(f.refTable);
        fkLabelMaps[f.col] = new Map(opts.map(o => [o.id, o.lbl]));
      } catch (e) { console.error(e); }
    }));
  }

  let cols = Object.keys(rows[0]).filter(c => c !== 'created_at' && c !== 'updated_at');
  if (t.labelCol && cols.includes('id') && cols.includes(t.labelCol)) {
    cols = ['id', t.labelCol, ...cols.filter(c => c !== 'id' && c !== t.labelCol)];
  }
  let html = '<table class="data"><thead><tr>' + cols.map(c => `<th>${c}</th>`).join('') + '<th></th></tr></thead><tbody>';
  rows.forEach((row, idx) => {
    html += '<tr>' + cols.map(c => {
      const v = row[c];
      if (c === 'removed_date' && t.key === 'individual_installation_histories') {
        return `<td>${v ? escapeHtml(v) : '<span class="badge now">現在設置中</span>'}</td>`;
      }
      if (fkLabelMaps[c]) {
        if (v === null || v === undefined) return '<td></td>';
        const label = fkLabelMaps[c].get(v);
        return `<td>${label ? escapeHtml(label) + `（#${v}）` : escapeHtml(v)}</td>`;
      }
      return `<td>${v === null ? '' : escapeHtml(v)}</td>`;
    }).join('') + `<td style="white-space:nowrap;"><button class="btn ghost small edit-btn" data-idx="${idx}">更新</button> <button class="btn danger" data-idx="${idx}">削除</button></td></tr>`;
  });
  html += '</tbody></table>';
  box.innerHTML = html;
  box.querySelectorAll('button.edit-btn').forEach(btn => {
    btn.onclick = () => openEditModal(t, rows[parseInt(btn.dataset.idx, 10)]);
  });
  box.querySelectorAll('button.danger').forEach(btn => {
    btn.onclick = () => onDelete(t, rows[parseInt(btn.dataset.idx, 10)]);
  });
}

// ================= 更新モーダル（キー項目・外部キー以外を編集。fieldにeditable:trueを付けた外部キーは編集可） =================
async function openEditModal(t, row) {
  const editableFields = t.fields.filter(f => f.kind !== 'fk' || f.editable === true);
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <h2>${escapeHtml(t.label)}の更新</h2>
      <p class="desc" style="margin:0 0 14px;">キー項目・その他の外部キー項目は変更できません。</p>
      <div id="edit-msgbox"></div>
      <div class="form-grid" id="edit-form-fields" style="margin-bottom:16px; grid-template-columns:1fr;"></div>
      <div style="display:flex; justify-content:flex-end; gap:8px;">
        <button class="btn ghost" id="edit-cancel-btn">キャンセル</button>
        <button class="btn" id="edit-save-btn">保存</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const fieldsWrap = overlay.querySelector('#edit-form-fields');
  if (!editableFields.length) {
    fieldsWrap.innerHTML = '<div class="empty">このテーブルに編集可能な項目はありません（キー・外部キーのみのため）</div>';
  }
  for (const f of editableFields) {
    const div = document.createElement('div');
    div.className = 'field';
    const lab = document.createElement('label');
    lab.textContent = f.label + (f.required ? ' *' : '');
    div.appendChild(lab);
    let input;
    const currentVal = row[f.col];
    if (f.kind === 'fk') {
      input = document.createElement('select');
      let opts = [];
      try { opts = await loadFkOptions(f.refTable); } catch (e) { console.error(e); }
      input.innerHTML = '<option value="">-- 選択 --</option>' + opts.map(r =>
        `<option value="${r.id}"${String(r.id) === String(currentVal) ? ' selected' : ''}>#${r.id} ${escapeHtml(r.lbl)}</option>`
      ).join('');
    } else if (f.kind === 'select') {
      input = document.createElement('select');
      input.innerHTML = '<option value="">-- 選択 --</option>' + f.options.map(([v, l]) =>
        `<option value="${v}"${String(v) === String(currentVal) ? ' selected' : ''}>${l}</option>`
      ).join('');
    } else if (f.kind === 'date') {
      input = document.createElement('input'); input.type = 'date';
      input.value = currentVal || '';
    } else if (f.kind === 'int' || f.kind === 'numeric') {
      input = document.createElement('input'); input.type = 'number';
      input.value = (currentVal === null || currentVal === undefined) ? '' : currentVal;
    } else {
      input = document.createElement('input'); input.type = 'text';
      input.value = (currentVal === null || currentVal === undefined) ? '' : currentVal;
    }
    input.id = 'ef_' + f.col;
    div.appendChild(input);
    fieldsWrap.appendChild(div);
  }

  overlay.querySelector('#edit-cancel-btn').onclick = () => overlay.remove();
  overlay.querySelector('#edit-save-btn').onclick = () => onUpdate(t, row, editableFields, overlay);
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
}

async function onUpdate(t, row, editableFields, overlay) {
  const payload = {};
  for (const f of editableFields) {
    const el = overlay.querySelector('#ef_' + f.col);
    const v = el.value;
    if (f.required && !v) {
      overlay.querySelector('#edit-msgbox').innerHTML = `<div class="msg err">「${escapeHtml(f.label)}」は必須です</div>`;
      return;
    }
    payload[f.col] = castVal(v, f.kind);
  }
  let q = sb.from(t.key).update(payload);
  if (t.compositeKey) {
    t.compositeKey.forEach(c => { q = q.eq(c, row[c]); });
  } else {
    q = q.eq('id', row.id);
  }
  const { error } = await q;
  if (error) {
    overlay.querySelector('#edit-msgbox').innerHTML = `<div class="msg err">更新に失敗しました: ${escapeHtml(error.message)}</div>`;
    return;
  }
  overlay.remove();
  showMsg('更新しました');
  renderMain();
}

// 設備一覧は台帳確認・設備交換履歴の両画面で共有するキャッシュ
let equipmentsCache = null;
async function ensureEquipmentsLoaded() {
  if (equipmentsCache === null) {
    const { data, error } = await sb.from('view_equipments_list').select('*').order('id');
    if (error) throw error;
    equipmentsCache = data || [];
  }
  return equipmentsCache;
}

async function loadLedgerEquipments() {
  try {
    ledgerState.allEquipments = await ensureEquipmentsLoaded();
  } catch (error) {
    document.getElementById('ledger-equipment-list').innerHTML = `<div class="msg err">読み込みエラー: ${escapeHtml(error.message)}</div>`;
    return;
  }
  populateLedgerTypeFilter();
  renderLedgerEquipmentList();
}

function populateLedgerTypeFilter() {
  const sel = document.getElementById('ledger-type-filter');
  if (!sel) return;
  const types = [...new Map(ledgerState.allEquipments.map(e => [e.equipment_type_id, e.equipment_type_name])).entries()]
    .sort((a, b) => a[1].localeCompare(b[1], 'ja'));
  const current = ledgerState.typeFilter;
  sel.innerHTML = '<option value="">すべて</option>' + types.map(([id, name]) =>
    `<option value="${id}"${String(id) === String(current) ? ' selected' : ''}>${escapeHtml(name)}</option>`
  ).join('');
}

function renderLedgerEquipmentList() {
  const box = document.getElementById('ledger-equipment-list');
  const countBox = document.getElementById('ledger-count');
  if (!box) return;
  const search = ledgerState.searchText.trim().toLowerCase();
  const rows = ledgerState.allEquipments.filter(e => {
    if (ledgerState.systemFilter && String(e.system_category_kbn) !== ledgerState.systemFilter) return false;
    if (ledgerState.typeFilter && String(e.equipment_type_id) !== ledgerState.typeFilter) return false;
    if (search) {
      const hay = [e.equipment_name, e.location_name_from, e.location_name_to].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
  if (countBox) countBox.textContent = `${rows.length} / ${ledgerState.allEquipments.length} 件`;
  if (!rows.length) {
    box.innerHTML = '<div class="empty">該当する設備がありません</div>';
    return;
  }
  box.innerHTML = rows.map(e => {
    const locLabel = (e.location_name_to && e.location_name_to !== e.location_name_from)
      ? `${escapeHtml(e.location_name_from)}～${escapeHtml(e.location_name_to)}`
      : escapeHtml(e.location_name_from);
    const active = e.id === ledgerState.selectedEquipmentId;
    const scColor = SYSTEM_CATEGORY_COLORS[e.system_category_kbn] || '#C7CAD1';
    return `<button class="ledger-eq-item${active ? ' active' : ''}" data-id="${e.id}" style="--sc-color:${scColor};">
      <div class="eq-name">${escapeHtml(e.equipment_name)}</div>
      <div class="eq-meta"><span class="sc-chip" style="background:${scColor};">${escapeHtml(SYSTEM_CATEGORY_LABELS[e.system_category_kbn] || '-')}</span>${escapeHtml(e.equipment_type_name)}／${locLabel}</div>
    </button>`;
  }).join('');
  box.querySelectorAll('.ledger-eq-item').forEach(btn => {
    btn.onclick = () => selectLedgerEquipment(parseInt(btn.dataset.id, 10));
  });
}

async function selectLedgerEquipment(equipmentId) {
  ledgerState.selectedEquipmentId = equipmentId;
  ledgerState.selectedIndividualId = null;
  renderLedgerEquipmentList();
  const detail = document.getElementById('ledger-detail');
  detail.innerHTML = '<div class="skeleton-line" style="height:22px; width:40%;"></div><div class="skeleton-line" style="margin-top:14px;"></div><div class="skeleton-line"></div><div class="skeleton-line"></div>';
  const eq = ledgerState.allEquipments.find(e => e.id === equipmentId);
  const [compRes, histRes] = await Promise.all([
    sb.from('equipment_type_components').select('*').eq('equipment_type_id', eq.equipment_type_id).order('display_order', { ascending: true }).order('id', { ascending: true }),
    sb.from('view_equipment_installation_histories').select('*').eq('equipment_id', equipmentId).order('installed_date', { ascending: true }),
  ]);
  if (compRes.error || histRes.error) {
    const err = compRes.error || histRes.error;
    detail.innerHTML = `<div class="msg err">読み込みエラー: ${escapeHtml(err.message)}</div>`;
    return;
  }
  ledgerState.components = compRes.data || [];
  ledgerState.histories = histRes.data || [];
  renderLedgerDetail(eq);
}

function renderLedgerDetail(eq) {
  const detail = document.getElementById('ledger-detail');
  const histByComponent = {};
  ledgerState.histories.forEach(h => {
    (histByComponent[h.component_id] = histByComponent[h.component_id] || []).push(h);
  });
  Object.values(histByComponent).forEach(list => list.sort((a, b) => (a.installed_date < b.installed_date ? -1 : a.installed_date > b.installed_date ? 1 : 0)));

  const byParent = {};
  ledgerState.components.forEach(c => {
    const key = c.parent_component_id || 'root';
    (byParent[key] = byParent[key] || []).push(c);
  });

  function individualBox(rec, isCurrent) {
    const selected = isCurrent && rec.individual_id === ledgerState.selectedIndividualId;
    return `<div class="exchange-box ${isCurrent ? 'new' : 'old'}${selected ? ' selected' : ''}"${isCurrent ? ` data-individual-id="${rec.individual_id}"` : ''}>
      <div class="lbl">${isCurrent ? '現在' : '旧'}</div>
      <div class="nm">${escapeHtml(rec.individual_name)}</div>
      <div class="meta">${escapeHtml(rec.maker_name || '')} ${escapeHtml(rec.model_number || '')}${rec.serial_number ? '　No.' + escapeHtml(rec.serial_number) : ''}</div>
      ${isCurrent ? '<div class="go">詳細 &gt;</div>' : ''}
    </div>`;
  }

  function renderComponentBlock(c, depth) {
    const indentBase = depth * 18;
    let html = `<div class="tree-node ${depth === 0 ? 'depth0' : 'depth-n'}" style="margin-left:${indentBase}px;"><span class="node-icon"></span>${escapeHtml(c.component_name)}${depth === 0 ? '<span style="color:#888; font-weight:400; margin-left:6px; font-size:11px;">（主装置）</span>' : ''}</div>`;
    const list = histByComponent[c.id] || [];
    let hasCurrent = false;
    if (!list.length) {
      html += `<div class="empty" style="margin-left:${indentBase + 16}px; padding:4px 0;">設置履歴がありません</div>`;
    } else {
      const first = list[0];
      const firstIsCurrent = !first.removed_date;
      if (firstIsCurrent) hasCurrent = true;
      const firstSelected = firstIsCurrent && first.individual_id === ledgerState.selectedIndividualId;
      html += `<div class="exchange-initial${firstSelected ? ' selected' : ''}" style="margin-left:${indentBase + 16}px;"${firstIsCurrent ? ` data-individual-id="${first.individual_id}"` : ''}>
        <div class="lbl">初回設置${firstIsCurrent ? '（現在設置中）' : ''}</div>
        <div class="nm">${escapeHtml(first.individual_name)}</div>
        <div class="meta">${escapeHtml(first.installed_date)} 設置${first.removed_date ? '　〜　' + escapeHtml(first.removed_date) + ' 撤去' : ''}</div>
        ${firstIsCurrent ? '<div class="go">詳細 &gt;</div>' : ''}
      </div>`;
      for (let i = 1; i < list.length; i++) {
        const prev = list[i - 1];
        const curr = list[i];
        const isCurrent = !curr.removed_date;
        if (isCurrent) hasCurrent = true;
        html += `<div class="exchange-card" style="margin-left:${indentBase + 16}px;">
          <div class="exchange-date">${escapeHtml(curr.installed_date)} に交換${isCurrent ? ' <span class="badge now">現在設置中</span>' : ''}</div>
          <div class="exchange-row">
            ${individualBox(prev, false)}
            <span class="exchange-arrow">→</span>
            ${individualBox(curr, true)}
          </div>
          ${curr.note ? `<div class="exchange-note">${escapeHtml(curr.note)}</div>` : ''}
        </div>`;
      }
    }
    html += `<div class="action-row" style="margin-left:${indentBase + 16}px;">
      <button class="btn ghost small exchange-btn" data-component-id="${c.id}">${hasCurrent ? '個体を交換する' : '個体を設置する'}</button>
    </div>`;
    (byParent[c.id] || []).forEach(ch => { html += renderComponentBlock(ch, depth + 1); });
    return html;
  }

  const roots = byParent['root'] || [];
  const scColor = SYSTEM_CATEGORY_COLORS[eq.system_category_kbn] || '#C7CAD1';
  const locLabel = eq.location_name_to && eq.location_name_to !== eq.location_name_from
    ? `${escapeHtml(eq.location_name_from)}～${escapeHtml(eq.location_name_to)}` : escapeHtml(eq.location_name_from);
  let html = `<div class="ledger-detail-head">
    <div>
      <div class="eq-title">${escapeHtml(eq.equipment_name)}</div>
      <div class="eq-tags">
        <span class="sc-chip" style="background:${scColor};">${escapeHtml(SYSTEM_CATEGORY_LABELS[eq.system_category_kbn] || '-')}</span>
        <span class="tag">${escapeHtml(eq.equipment_type_name)}</span>
        <span class="tag">${locLabel}</span>
      </div>
    </div>
  </div>`;
  html += '<div class="ledger-tree">';
  html += roots.length ? roots.map(r => renderComponentBlock(r, 0)).join('') : '<div class="empty">構成要素が登録されていません</div>';
  html += '</div>';
  detail.innerHTML = html;

  detail.querySelectorAll('[data-individual-id]').forEach(el => {
    el.onclick = () => selectLedgerIndividual(parseInt(el.dataset.individualId, 10));
  });
  detail.querySelectorAll('.exchange-btn').forEach(btn => {
    btn.onclick = () => {
      const componentId = parseInt(btn.dataset.componentId, 10);
      const component = ledgerState.components.find(c => c.id === componentId);
      const list = histByComponent[componentId] || [];
      const currentRec = list.find(h => !h.removed_date) || null;
      openExchangeModal(eq, component, currentRec);
    };
  });
}

async function openIndividualDetailModal(individualId) {

      html += `<div class="timeline-item${h.removed_date ? '' : ' current'}"><span class="period">${escapeHtml(period)}</span><span class="place">${escapeHtml(h.equipment_type_name)}／${escapeHtml(h.component_name)}</span>${badge}</div>`;
    });

  } else {
    html += '<div class="empty">履歴がありません</div>';
  }
  box.innerHTML = html;
}

// ================= 個体交換登録（モーダル） =================
let individualsCache = null;

async function openExchangeModal(eq, component, currentRec) {
  const today = new Date().toISOString().slice(0, 10);
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box" style="width:460px;">
      <h2>${currentRec ? '個体交換の登録' : '個体設置の登録'}</h2>
      <p class="desc" style="margin:0 0 14px;">
        設備: ${escapeHtml(eq.equipment_name)} ／ 構成要素: ${escapeHtml(component.component_name)}
        ${currentRec ? `<br>現在設置中: ${escapeHtml(currentRec.individual_name)}（設置日 ${escapeHtml(currentRec.installed_date)}）` : ''}
      </p>
      <div id="exmodal-msgbox"></div>
      <div class="toggle-group">
        <button type="button" class="toggle-btn active" id="exmodal-mode-existing">既存の個体から選択</button>
        <button type="button" class="toggle-btn" id="exmodal-mode-new">新しい個体を登録</button>
      </div>
      <div id="exmodal-existing-wrap" class="field">
        <label>個体 *</label>
        <select id="exmodal-individual-select"><option value="">読み込み中...</option></select>
      </div>
      <div id="exmodal-new-wrap" class="form-grid" style="display:none; margin-bottom:4px;"></div>
      <div class="field" style="margin-top:10px;">
        <label>${currentRec ? '交換日' : '設置日'} *</label>
        <input type="date" id="exmodal-date" value="${today}">
      </div>
      <div class="field" style="margin-top:10px;">
        <label>備考（交換理由など）</label>
        <input type="text" id="exmodal-note">
      </div>
      <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:16px;">
        <button class="btn ghost" id="exmodal-cancel-btn">キャンセル</button>
        <button class="btn" id="exmodal-submit-btn">登録</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.querySelector('#exmodal-cancel-btn').onclick = () => overlay.remove();

  const existingWrap = overlay.querySelector('#exmodal-existing-wrap');
  const newWrap = overlay.querySelector('#exmodal-new-wrap');
  const btnExisting = overlay.querySelector('#exmodal-mode-existing');
  const btnNew = overlay.querySelector('#exmodal-mode-new');
  btnExisting.onclick = () => {
    btnExisting.classList.add('active'); btnNew.classList.remove('active');
    existingWrap.style.display = ''; newWrap.style.display = 'none';
  };
  btnNew.onclick = () => {
    btnNew.classList.add('active'); btnExisting.classList.remove('active');
    existingWrap.style.display = 'none'; newWrap.style.display = '';
  };

  // 既存個体の選択肢を読み込み
  try {
    const individuals = await ensureIndividualsLoaded();
    const sel = overlay.querySelector('#exmodal-individual-select');
    sel.innerHTML = '<option value="">-- 選択 --</option>' + individuals.map(i =>
      `<option value="${i.id}">#${i.id} ${escapeHtml(i.individual_name)}${i.maker_name ? '（' + escapeHtml(i.maker_name) + ' ' + escapeHtml(i.model_number || '') + '）' : ''}</option>`
    ).join('');
  } catch (e) {
    overlay.querySelector('#exmodal-individual-select').innerHTML = '<option value="">読み込みエラー</option>';
  }

  // 新規個体登録フォーム（individualsテーブルの項目定義を再利用して動的生成）
  const newFields = TABLE_MAP['individuals'].fields;
  for (const f of newFields) {
    const div = document.createElement('div');
    div.className = 'field';
    const lab = document.createElement('label');
    lab.textContent = f.label + (f.required ? ' *' : '');
    div.appendChild(lab);
    let input;
    if (f.kind === 'fk') {
      input = document.createElement('select');
      let opts = [];
      try { opts = await loadFkOptions(f.refTable); } catch (e) { console.error(e); }
      input.innerHTML = '<option value="">-- 選択 --</option>' + opts.map(r => `<option value="${r.id}">#${r.id} ${escapeHtml(r.lbl)}</option>`).join('');
    } else if (f.kind === 'date') {
      input = document.createElement('input'); input.type = 'date';
    } else {
      input = document.createElement('input'); input.type = 'text';
    }
    input.id = 'exnew_' + f.col;
    div.appendChild(input);
    newWrap.appendChild(div);
  }

  overlay.querySelector('#exmodal-submit-btn').onclick = () => submitExchange(overlay, eq, component, currentRec);
}

async function submitExchange(overlay, eq, component, currentRec) {
  const msgBox = overlay.querySelector('#exmodal-msgbox');
  msgBox.innerHTML = '';
  const isNewMode = overlay.querySelector('#exmodal-mode-new').classList.contains('active');
  const dateVal = overlay.querySelector('#exmodal-date').value;
  const noteVal = overlay.querySelector('#exmodal-note').value;

  if (!dateVal) {
    msgBox.innerHTML = '<div class="msg err">日付は必須です</div>';
    return;
  }
  if (currentRec && dateVal <= currentRec.installed_date) {
    msgBox.innerHTML = '<div class="msg err">交換日は、現在設置中の個体の設置日より後の日付にしてください</div>';
    return;
  }

  let individualId = null;
  if (isNewMode) {
    const payload = {};
    for (const f of TABLE_MAP['individuals'].fields) {
      const el = overlay.querySelector('#exnew_' + f.col);
      const v = el ? el.value : '';
      if (f.required && !v) {
        msgBox.innerHTML = `<div class="msg err">「${escapeHtml(f.label)}」は必須です</div>`;
        return;
      }
      payload[f.col] = castVal(v, f.kind);
    }
    const { data, error } = await sb.from('individuals').insert(payload).select('id').single();
    if (error) {
      msgBox.innerHTML = `<div class="msg err">個体の登録に失敗しました: ${escapeHtml(error.message)}</div>`;
      return;
    }
    individualId = data.id;
    individualsCache = null;
  } else {
    const sel = overlay.querySelector('#exmodal-individual-select');
    if (!sel.value) {
      msgBox.innerHTML = '<div class="msg err">個体を選択してください</div>';
      return;
    }
    individualId = parseInt(sel.value, 10);
  }

  if (currentRec) {
    const { error } = await sb.from('individual_installation_histories')
      .update({ removed_date: dateVal })
      .eq('id', currentRec.history_id);
    if (error) {
      msgBox.innerHTML = `<div class="msg err">既存履歴の更新に失敗しました: ${escapeHtml(error.message)}</div>`;
      return;
    }
  }

  const { error: insError } = await sb.from('individual_installation_histories').insert({
    individual_id: individualId,
    equipment_id: eq.id,
    component_id: component.id,
    installed_date: dateVal,
    note: noteVal || null,
  });
  if (insError) {
    msgBox.innerHTML = `<div class="msg err">登録に失敗しました: ${escapeHtml(insError.message)}</div>`;
    return;
  }

  overlay.remove();
  showMsg(currentRec ? '個体を交換しました' : '個体を設置しました');
  await selectLedgerEquipment(eq.id);
}

// ================= 製品確認画面（製品種別→個体の階層表示・個体登録・属性値登録） =================
let productCategoriesCache = null;
let productIndividualCounts = new Map();
async function ensureProductCategoriesLoaded() {
  if (productCategoriesCache === null) {
    const { data, error } = await sb.from('product_categories').select('*').order('id');
    if (error) throw error;
    productCategoriesCache = data || [];
    const { data: indData, error: indErr } = await sb.from('individuals').select('product_category_id');
    if (!indErr) {
      productIndividualCounts = new Map();
      (indData || []).forEach(r => {
        productIndividualCounts.set(r.product_category_id, (productIndividualCounts.get(r.product_category_id) || 0) + 1);
      });
    }
  }
  return productCategoriesCache;
}

async function loadProductCategories() {
  try {
    productState.categories = await ensureProductCategoriesLoaded();
  } catch (error) {
    document.getElementById('product-category-list').innerHTML = `<div class="msg err">読み込みエラー: ${escapeHtml(error.message)}</div>`;

  }
  renderProductCategoryList();

function renderProductCategoryList() {
  const box = document.getElementById('product-category-list');
  const countBox = document.getElementById('product-count');
  if (!box) return;
  const search = productState.searchText.trim().toLowerCase();
  const rows = productState.categories.filter(c => {
    if (search && !c.product_category_name.toLowerCase().includes(search)) return false;
    return true;
  });
  if (countBox) countBox.textContent = `${rows.length} / ${productState.categories.length} 件`;
  if (!rows.length) {
    box.innerHTML = '<div class="empty">該当する製品種別がありません</div>';
    return;
  }
  box.innerHTML = rows.map(c => {
    const active = c.id === productState.selectedCategoryId;
    const count = productIndividualCounts.get(c.id) || 0;
    return `<button class="ledger-eq-item${active ? ' active' : ''}" data-id="${c.id}">
      <div class="eq-name">${escapeHtml(c.product_category_name)}</div>
      <div class="eq-meta">個体 ${count}件</div>
    </button>`;
  }).join('');
  box.querySelectorAll('.ledger-eq-item').forEach(btn => {

      <div id="product-ind-msgbox"></div>
      <div class="form-grid" id="product-ind-fields"></div>
      <div style="margin-top:12px;"><button class="btn" id="product-ind-add-btn">登録</button></div>
    </div>
  `;
  const fieldsWrap = document.getElementById('product-ind-fields');
  const fields = TABLE_MAP['individuals'].fields.filter(f => f.col !== 'product_category_id');
  fields.forEach(f => {
    const div = document.createElement('div');
    div.className = 'field';
    const lab = document.createElement('label');
    lab.textContent = f.label + (f.required ? ' *' : '');
    div.appendChild(lab);
    let input;
    if (f.kind === 'date') { input = document.createElement('input'); input.type = 'date'; }
    else { input = document.createElement('input'); input.type = 'text'; }
    input.id = 'pind_' + f.col;
    div.appendChild(input);
    fieldsWrap.appendChild(div);
  });
  document.getElementById('product-ind-add-btn').onclick = () => submitProductIndividual(cat, fields);
}

async function submitProductIndividual(cat, fields) {
  const msgBox = document.getElementById('product-ind-msgbox');
  const payload = { product_category_id: cat.id };
  for (const f of fields) {
    const el = document.getElementById('pind_' + f.col);
    const v = el.value;
    if (f.required && !v) {
      msgBox.innerHTML = `<div class="msg err">「${escapeHtml(f.label)}」は必須です</div>`;
      return;
    }
    payload[f.col] = castVal(v, f.kind);
  }
  const { error } = await sb.from('individuals').insert(payload);
  if (error) {
    msgBox.innerHTML = `<div class="msg err">登録に失敗しました: ${escapeHtml(error.message)}</div>`;
    return;
  }
  individualsCache = null; // 個体交換登録モーダルのキャッシュも無効化
  productIndividualCounts.set(cat.id, (productIndividualCounts.get(cat.id) || 0) + 1);
  showMsg('個体を登録しました');
  await selectProductCategory(cat.id);
}

async function selectProductIndividual(individualId) {
  productState.selectedIndividualId = individualId;
  const cat = productState.categories.find(c => c.id === productState.selectedCategoryId);
  renderProductDetail(cat);
  await renderProductIndividualDetail();
}

async function renderProductIndividualDetail() {
  const box = document.getElementById('product-individual-detail');
  if (!box) return;
  box.innerHTML = '読み込み中...';
  const individualId = productState.selectedIndividualId;
  const { data, error } = await sb.from('view_individual_attributes').select('*').eq('individual_id', individualId).order('display_order', { ascending: true });
  if (error) {
    box.innerHTML = `<div class="msg err">読み込みエラー: ${escapeHtml(error.message)}</div>`;
    return;
  }
  const attrs = data || [];
  const usedDefIds = new Set(attrs.map(a => a.attribute_definition_id));
  const availableDefs = productState.attributeDefs.filter(d => !usedDefIds.has(d.id));

  let html = '<p style="font-size:12px; color:#666; margin:0 0 8px; font-weight:600;">属性値</p>';
  if (attrs.length) {
    html += '<div class="attr-grid">';
    attrs.forEach(a => {
      html += `<div class="attr-chip"><span class="k">${escapeHtml(a.attribute_name)}</span><span class="v">${escapeHtml(a.attribute_value)}${a.unit ? ' ' + escapeHtml(a.unit) : ''}</span></div>`;
    });
    html += '</div>';
  } else {
    html += '<div class="empty" style="margin-bottom:10px;">この個体に属性値の登録はありません</div>';
  }

  html += '<div id="product-attr-msgbox"></div>';
  if (availableDefs.length) {
    html += `<div class="form-grid" style="margin-top:10px; align-items:end;">
      <div class="field">
        <label>属性を追加</label>
        <select id="product-attr-def-select">${availableDefs.map(d => `<option value="${d.id}">${escapeHtml(d.attribute_name)}${d.unit ? '（' + escapeHtml(d.unit) + '）' : ''}</option>`).join('')}</select>
      </div>
      <div class="field">
        <label>値</label>
        <input type="text" id="product-attr-value-input">
      </div>
      <div><button class="btn" id="product-attr-add-btn">追加</button></div>
    </div>`;
  } else if (productState.attributeDefs.length) {
    html += '<div class="empty" style="margin-top:8px;">この製品種別で定義されている属性はすべて登録済みです</div>';
  } else {
    html += '<div class="empty" style="margin-top:8px;">この製品種別には属性定義がありません（「属性定義」画面で追加できます）</div>';
  }

  box.innerHTML = html;
  const addBtn = document.getElementById('product-attr-add-btn');
  if (addBtn) addBtn.onclick = () => submitProductAttributeValue(individualId);
}

async function submitProductAttributeValue(individualId) {
  const msgBox = document.getElementById('product-attr-msgbox');
  const defSel = document.getElementById('product-attr-def-select');
  const valInput = document.getElementById('product-attr-value-input');
  const attributeDefinitionId = parseInt(defSel.value, 10);
  const value = valInput.value;
  if (!value) {
    msgBox.innerHTML = '<div class="msg err">値を入力してください</div>';
    return;
  }
  const { error } = await sb.from('individual_attribute_values').insert({
    individual_id: individualId,
    attribute_definition_id: attributeDefinitionId,
    attribute_value: value,
  });
  if (error) {
    msgBox.innerHTML = `<div class="msg err">登録に失敗しました: ${escapeHtml(error.message)}</div>`;
    return;
  }
  showMsg('属性値を登録しました');
  await renderProductIndividualDetail();
}

// ================= 設備種別確認画面（構成要素の階層表示・追加・削除、実設置設備の表示） =================
let equipmentTypesCache = null;
async function ensureEquipmentTypesLoaded() {
  if (equipmentTypesCache === null) {
    const { data, error } = await sb.from('equipment_types').select('*').order('id');
    if (error) throw error;
    equipmentTypesCache = data || [];
  }
  return equipmentTypesCache;
}

async function renderEquipmentTypeView() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <h1 class="page-title">設備種別確認</h1>
    <p class="desc">設備種別を選択すると、構成要素（主装置・付属部品）の階層構造と、実際に設置されている設備を確認できます。構成要素の追加・削除もこの画面から行えます。</p>
    <div id="msgbox"></div>
    <div class="ledger-layout">
      <div class="card ledger-sidebar">
        <h2>設備種別一覧</h2>
        <div class="ledger-filters">
          <div class="field">
            <label>設備種別名で検索</label>
            <input type="text" id="eqtype-search" placeholder="例: 転てつ機" autocomplete="off">
          </div>
        </div>
        <div class="ledger-count" id="eqtype-count"></div>
        <div id="eqtype-list" class="ledger-eq-list">
          <div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div>
        </div>
      </div>
      <div class="card" style="flex:1; min-width:0;">
        <div id="eqtype-detail"><div class="empty">左の一覧から設備種別を選択してください</div></div>
      </div>
    </div>
  `;
  const searchInput = document.getElementById('eqtype-search');
  searchInput.value = equipmentTypeState.searchText;
  searchInput.oninput = (e) => { equipmentTypeState.searchText = e.target.value; renderEquipmentTypeList(); };
  await loadEquipmentTypes();
}

async function loadEquipmentTypes() {
  try {
    equipmentTypeState.types = await ensureEquipmentTypesLoaded();
  } catch (error) {
    document.getElementById('eqtype-list').innerHTML = `<div class="msg err">読み込みエラー: ${escapeHtml(error.message)}</div>`;
    return;
  }
  renderEquipmentTypeList();
}

function renderEquipmentTypeList() {
  const box = document.getElementById('eqtype-list');
  const countBox = document.getElementById('eqtype-count');
  if (!box) return;
  const search = equipmentTypeState.searchText.trim().toLowerCase();
  const rows = equipmentTypeState.types.filter(t => !search || t.equipment_type_name.toLowerCase().includes(search));
  if (countBox) countBox.textContent = `${rows.length} / ${equipmentTypeState.types.length} 件`;
  if (!rows.length) {
    box.innerHTML = '<div class="empty">該当する設備種別がありません</div>';
    return;
  }
  box.innerHTML = rows.map(t => {
    const active = t.id === equipmentTypeState.selectedTypeId;
    const scColor = SYSTEM_CATEGORY_COLORS[t.system_category_kbn] || '#C7CAD1';
    return `<button class="ledger-eq-item${active ? ' active' : ''}" data-id="${t.id}" style="--sc-color:${scColor};">
      <div class="eq-name">${escapeHtml(t.equipment_type_name)}</div>
      <div class="eq-meta"><span class="sc-chip" style="background:${scColor};">${escapeHtml(SYSTEM_CATEGORY_LABELS[t.system_category_kbn] || '-')}</span>${t.equipment_form_kbn === 2 ? '線もの' : '箱もの'}</div>
    </button>`;
  }).join('');
  box.querySelectorAll('.ledger-eq-item').forEach(btn => {
    btn.onclick = () => selectEquipmentType(parseInt(btn.dataset.id, 10));
  });
}

async function selectEquipmentType(typeId) {
  equipmentTypeState.selectedTypeId = typeId;
  renderEquipmentTypeList();
  const detail = document.getElementById('eqtype-detail');
  detail.innerHTML = '<div class="skeleton-line" style="height:22px; width:40%;"></div><div class="skeleton-line" style="margin-top:14px;"></div><div class="skeleton-line"></div>';
  const type = equipmentTypeState.types.find(t => t.id === typeId);
  let allEquipments;
  try {
    allEquipments = await ensureEquipmentsLoaded();
  } catch (error) {
    detail.innerHTML = `<div class="msg err">読み込みエラー: ${escapeHtml(error.message)}</div>`;
    return;
  }
  const { data: compData, error: compError } = await sb.from('equipment_type_components').select('*').eq('equipment_type_id', typeId).order('display_order', { ascending: true }).order('id', { ascending: true });
  if (compError) {
    detail.innerHTML = `<div class="msg err">読み込みエラー: ${escapeHtml(compError.message)}</div>`;
    return;
  }
  equipmentTypeState.components = compData || [];
  equipmentTypeState.installedEquipments = allEquipments.filter(e => e.equipment_type_id === typeId);
  renderEquipmentTypeDetail(type);
}

function renderEquipmentTypeDetail(type) {
  const detail = document.getElementById('eqtype-detail');
  const byParent = {};
  equipmentTypeState.components.forEach(c => {
    const key = c.parent_component_id || 'root';
    (byParent[key] = byParent[key] || []).push(c);
  });

  function renderNode(c, depth) {
    const indentBase = depth * 18;
    let html = `<div class="tree-node ${depth === 0 ? 'depth0' : 'depth-n'}" style="margin-left:${indentBase}px; display:flex; align-items:center; justify-content:space-between; gap:8px;">
      <span><span class="node-icon"></span>${escapeHtml(c.component_name)}${depth === 0 ? '<span style="color:#888; font-weight:400; margin-left:6px; font-size:11px;">（主装置）</span>' : ''}</span>
      <span style="display:flex; gap:4px; flex-shrink:0;">
        <button class="btn ghost small eqtype-add-child-btn" data-parent-id="${c.id}">子を追加</button>
        <button class="btn danger eqtype-delete-btn" data-id="${c.id}">削除</button>
      </span>
    </div>`;
    (byParent[c.id] || []).forEach(ch => { html += renderNode(ch, depth + 1); });
    return html;
  }

  const roots = byParent['root'] || [];
  const scColor = SYSTEM_CATEGORY_COLORS[type.system_category_kbn] || '#C7CAD1';
  let html = `<div class="ledger-detail-head">
    <div>
      <div class="eq-title">${escapeHtml(type.equipment_type_name)}</div>
      <div class="eq-tags">
        <span class="sc-chip" style="background:${scColor};">${escapeHtml(SYSTEM_CATEGORY_LABELS[type.system_category_kbn] || '-')}</span>
        <span class="tag">${type.equipment_form_kbn === 2 ? '線もの' : '箱もの'}</span>
      </div>
    </div>
  </div>`;

  html += `<div class="toolbar" style="margin-bottom:8px;">
    <h2 style="margin:0; font-size:13px; color:#333;">構成要素（主装置・付属部品）</h2>
    <button class="btn ghost small" id="eqtype-add-root-btn">主装置を追加</button>
  </div>`;
  html += `<div id="eqtype-add-component-form" style="display:none; margin-bottom:14px;"></div>`;
  html += '<div class="ledger-tree">';
  html += roots.length ? roots.map(r => renderNode(r, 0)).join('') : '<div class="empty">構成要素が登録されていません</div>';
  html += '</div>';

  html += `<div class="toolbar" style="margin-top:18px;">
    <h2 style="margin:0; font-size:13px; color:#333;">実際に設置されている設備</h2>
  </div>`;
  if (!equipmentTypeState.installedEquipments.length) {
    html += '<div class="empty">この設備種別で設置されている設備はありません</div>';
  } else {
    html += '<div style="display:flex; flex-direction:column; gap:6px;">';
    html += equipmentTypeState.installedEquipments.map(eq => {
      const locLabel = (eq.location_name_to && eq.location_name_to !== eq.location_name_from)
        ? `${escapeHtml(eq.location_name_from)}～${escapeHtml(eq.location_name_to)}`
        : escapeHtml(eq.location_name_from);
      return `<div class="ind-card" data-eq-id="${eq.id}">
        <div>
          <div class="ind-name">${escapeHtml(eq.equipment_name)}</div>
          <div class="ind-sub">${locLabel}${eq.install_date ? '　取付日: ' + escapeHtml(eq.install_date) : ''}</div>
        </div>
        <div class="go">台帳確認で見る &gt;</div>
      </div>`;
    }).join('');
    html += '</div>';
  }

  detail.innerHTML = html;

  document.getElementById('eqtype-add-root-btn').onclick = () => toggleEqtypeAddComponentForm(type, null);
  detail.querySelectorAll('.eqtype-add-child-btn').forEach(btn => {
    btn.onclick = () => toggleEqtypeAddComponentForm(type, parseInt(btn.dataset.parentId, 10));
  });
  detail.querySelectorAll('.eqtype-delete-btn').forEach(btn => {
    btn.onclick = () => deleteEquipmentTypeComponent(type, parseInt(btn.dataset.id, 10));
  });
  detail.querySelectorAll('.ind-card[data-eq-id]').forEach(el => {
    el.onclick = () => jumpToLedgerEquipment(parseInt(el.dataset.eqId, 10));
  });
}

function toggleEqtypeAddComponentForm(type, parentId) {
  const wrap = document.getElementById('eqtype-add-component-form');
  const alreadyShowingSame = wrap.style.display !== 'none' && wrap.dataset.parentId === String(parentId);
  if (alreadyShowingSame) {
    wrap.style.display = 'none';
    wrap.innerHTML = '';
    wrap.dataset.parentId = '';
    return;
  }
  wrap.dataset.parentId = String(parentId);
  wrap.style.display = '';
  const parentComponent = parentId ? equipmentTypeState.components.find(c => c.id === parentId) : null;
  const parentLabel = parentComponent ? parentComponent.component_name : '主装置（トップレベル）';
  wrap.innerHTML = `
    <div class="card" style="background:#FAFBFC; margin-bottom:0;">
      <h2>構成要素を追加（親: ${escapeHtml(parentLabel)}）</h2>
      <div id="eqtype-comp-msgbox"></div>
      <div class="form-grid">
        <div class="field">
          <label>構成要素名称 *</label>
          <input type="text" id="eqtype-comp-name">
        </div>
        <div class="field">
          <label>表示順</label>
          <input type="number" id="eqtype-comp-order">
        </div>
      </div>
      <div style="margin-top:12px;"><button class="btn" id="eqtype-comp-add-btn">登録</button></div>
    </div>
  `;
  document.getElementById('eqtype-comp-add-btn').onclick = () => submitEqtypeComponent(type, parentId);
}

async function submitEqtypeComponent(type, parentId) {
  const msgBox = document.getElementById('eqtype-comp-msgbox');
  const name = document.getElementById('eqtype-comp-name').value.trim();
  const orderVal = document.getElementById('eqtype-comp-order').value;
  if (!name) {
    msgBox.innerHTML = '<div class="msg err">構成要素名称は必須です</div>';
    return;
  }
  const payload = {
    equipment_type_id: type.id,
    parent_component_id: parentId || null,
    component_name: name,
    display_order: orderVal === '' ? null : parseInt(orderVal, 10),
  };
  const { error } = await sb.from('equipment_type_components').insert(payload);
  if (error) {
    msgBox.innerHTML = `<div class="msg err">登録に失敗しました: ${escapeHtml(error.message)}</div>`;
    return;
  }
  showMsg('構成要素を登録しました');
  await selectEquipmentType(type.id);
}

async function deleteEquipmentTypeComponent(type, componentId) {
  if (!confirm('この構成要素を削除しますか？（下位の構成要素や設置履歴から参照されている場合は削除できません）')) return;
  const { error } = await sb.from('equipment_type_components').delete().eq('id', componentId);
  if (error) {
    showMsg('削除に失敗しました（下位の構成要素や設置履歴から参照されている可能性があります）: ' + error.message, true);
    return;
  }
  showMsg('削除しました');
  await selectEquipmentType(type.id);
}

async function jumpToLedgerEquipment(equipmentId) {
  activeKey = 'ledger_view';
  renderSidebar();
  await renderMain();
  await selectLedgerEquipment(equipmentId);
}
</script>
</body>
